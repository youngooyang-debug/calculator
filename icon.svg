<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#161726"/>

  <!-- Display panel -->
  <rect x="12" y="12" width="168" height="44" rx="10" fill="#ffffff" fill-opacity="0.08"/>
  <!-- Expression -->
  <text x="176" y="30" font-size="11" text-anchor="end" fill="#88aacc"
        font-family="system-ui, sans-serif">sin(π/6) =</text>
  <!-- Result -->
  <text x="176" y="50" font-size="22" text-anchor="end" fill="#ffffff"
        font-family="monospace" font-weight="300">0.5</text>

  <!-- Row 1: sin | √x | π | ÷ -->
  <rect x="12"  y="66" width="38" height="34" rx="8" fill="#3535a0"/>
  <rect x="55"  y="66" width="38" height="34" rx="8" fill="#3535a0"/>
  <rect x="98"  y="66" width="38" height="34" rx="8" fill="#3535a0"/>
  <rect x="141" y="66" width="38" height="34" rx="8" fill="#e07800"/>
  <text x="31"  y="88" font-size="13" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif">sin</text>
  <text x="74"  y="87" font-size="14" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif">√x</text>
  <text x="117" y="89" font-size="18" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif">π</text>
  <text x="160" y="89" font-size="22" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif">÷</text>

  <!-- Row 2: 7 | 8 | 9 | × -->
  <rect x="12"  y="106" width="38" height="34" rx="8" fill="#252640"/>
  <rect x="55"  y="106" width="38" height="34" rx="8" fill="#252640"/>
  <rect x="98"  y="106" width="38" height="34" rx="8" fill="#252640"/>
  <rect x="141" y="106" width="38" height="34" rx="8" fill="#e07800"/>
  <text x="31"  y="128" font-size="18" text-anchor="middle" fill="#dddddd" font-family="system-ui, sans-serif">7</text>
  <text x="74"  y="128" font-size="18" text-anchor="middle" fill="#dddddd" font-family="system-ui, sans-serif">8</text>
  <text x="117" y="128" font-size="18" text-anchor="middle" fill="#dddddd" font-family="system-ui, sans-serif">9</text>
  <text x="160" y="128" font-size="22" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif">×</text>

  <!-- Row 3: 4 | 5 | 6 | = -->
  <rect x="12"  y="146" width="38" height="34" rx="8" fill="#252640"/>
  <rect x="55"  y="146" width="38" height="34" rx="8" fill="#252640"/>
  <rect x="98"  y="146" width="38" height="34" rx="8" fill="#252640"/>
  <rect x="141" y="146" width="38" height="34" rx="8" fill="#b85500"/>
  <text x="31"  y="168" font-size="18" text-anchor="middle" fill="#dddddd" font-family="system-ui, sans-serif">4</text>
  <text x="74"  y="168" font-size="18" text-anchor="middle" fill="#dddddd" font-family="system-ui, sans-serif">5</text>
  <text x="117" y="168" font-size="18" text-anchor="middle" fill="#dddddd" font-family="system-ui, sans-serif">6</text>
  <text x="160" y="168" font-size="26" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif">=</text>
</svg>
